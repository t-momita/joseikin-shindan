<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申請管理画面 | Next Season</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a2744;
    --accent: #2563eb;
    --accent-light: #3b82f6;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --sidebar-w: 240px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #1a2744 0%, #2563eb 100%);
  }

  .login-box {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 360px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo h1 {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: -0.5px;
  }

  .login-logo p {
    font-size: 12px;
    color: var(--text-sub);
    margin-top: 4px;
  }

  .login-box label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-sub);
    margin-bottom: 6px;
  }

  .login-box input {
    width: 100%;
    padding: 12px 16px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
    margin-bottom: 20px;
  }

  .login-box input:focus { border-color: var(--accent); }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-login:hover { background: #1d4ed8; }

  .login-error {
    color: var(--danger);
    font-size: 13px;
    text-align: center;
    margin-top: 12px;
    display: none;
  }

  /* ===== MAIN LAYOUT ===== */
  #mainScreen { display: none; }

  .sidebar {
    position: fixed;
    left: 0; top: 0;
    width: var(--sidebar-w);
    height: 100vh;
    background: var(--primary);
    color: white;
    display: flex;
    flex-direction: column;
    z-index: 100;
  }

  .sidebar-header {
    padding: 24px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .sidebar-header h1 {
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .sidebar-header p {
    font-size: 11px;
    opacity: 0.5;
    margin-top: 3px;
  }

  .sidebar-nav {
    padding: 16px 12px;
    flex: 1;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 4px;
  }

  .nav-item:hover { background: rgba(255,255,255,0.08); }
  .nav-item.active { background: var(--accent); }

  .nav-icon { font-size: 16px; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 12px;
    opacity: 0.5;
  }

  .content {
    margin-left: var(--sidebar-w);
    min-height: 100vh;
  }

  .topbar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .btn-refresh {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn-refresh:hover { background: #1d4ed8; }

  .btn-logout {
    padding: 8px 16px;
    background: transparent;
    color: var(--text-sub);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-logout:hover { background: #fee2e2; color: var(--danger); border-color: #fca5a5; }

  .main-content { padding: 32px; }

  /* ===== STATS ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: white;
    border-radius: 12px;
    padding: 20px 24px;
    border: 1px solid var(--border);
  }

  .stat-label {
    font-size: 12px;
    color: var(--text-sub);
    font-weight: 500;
    margin-bottom: 8px;
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    color: var(--primary);
  }

  .stat-value span {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-sub);
    margin-left: 4px;
  }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    background: white;
    border-radius: 12px;
    padding: 16px 20px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .filter-bar input[type="text"] {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }

  .filter-bar input:focus { border-color: var(--accent); }

  .filter-bar select {
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    background: white;
    cursor: pointer;
  }

  /* ===== TABLE ===== */
  .table-wrap {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead {
    background: #f8fafc;
    border-bottom: 1px solid var(--border);
  }

  th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    color: var(--text-sub);
    font-size: 12px;
    white-space: nowrap;
  }

  td {
    padding: 14px 16px;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }

  tr:last-child td { border-bottom: none; }

  tr:hover td { background: #f8fafc; }

  .company-name {
    font-weight: 600;
    color: var(--primary);
  }

  .btn-detail {
    padding: 5px 14px;
    background: transparent;
    border: 1.5px solid var(--accent);
    color: var(--accent);
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-detail:hover { background: var(--accent); color: white; }

  /* ===== STATUS BADGES ===== */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }

  .badge-new { background: #dbeafe; color: #1d4ed8; }
  .badge-contact { background: #fef3c7; color: #92400e; }
  .badge-progress { background: #ede9fe; color: #6d28d9; }
  .badge-submitted { background: #d1fae5; color: #065f46; }
  .badge-done { background: #f1f5f9; color: #475569; }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: white;
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 25px 80px rgba(0,0,0,0.3);
  }

  .modal-header {
    padding: 24px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: white;
    border-radius: 16px 16px 0 0;
  }

  .modal-header h3 {
    font-size: 17px;
    font-weight: 700;
    color: var(--primary);
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-sub);
    transition: background 0.2s;
  }

  .modal-close:hover { background: #fee2e2; color: var(--danger); }

  .modal-body { padding: 24px 28px; }

  .detail-section {
    margin-bottom: 24px;
  }

  .detail-section h4 {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-sub);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 12px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .detail-item label {
    display: block;
    font-size: 11px;
    color: var(--text-sub);
    margin-bottom: 3px;
    font-weight: 500;
  }

  .detail-item p {
    font-size: 14px;
    color: var(--text);
    font-weight: 500;
  }

  .detail-item.full { grid-column: 1/-1; }

  .status-select-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
    padding: 16px;
    background: var(--bg);
    border-radius: 10px;
  }

  .status-select-wrap label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
  }

  .status-select-wrap select {
    flex: 1;
    padding: 9px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    background: white;
    cursor: pointer;
  }

  .btn-update {
    padding: 9px 20px;
    background: var(--success);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-update:hover { background: #047857; }

  /* ===== MEMO ===== */
  .memo-wrap {
    margin-top: 16px;
  }

  .memo-wrap label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 6px;
  }

  .memo-wrap textarea {
    width: 100%;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    outline: none;
    transition: border-color 0.2s;
  }

  .memo-wrap textarea:focus { border-color: var(--accent); }

  /* ===== LOADING ===== */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--text-sub);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 60px;
    color: var(--text-sub);
    font-size: 14px;
  }

  /* ===== TOAST ===== */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    padding: 14px 20px;
    background: var(--primary);
    color: white;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    z-index: 999;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  /* ===== PAGE VIEWS ===== */
  .page { display: none; }
  .page.active { display: block; }

  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Next Season</h1>
      <p>申請管理システム</p>
    </div>
    <div>
      <label>パスワード</label>
      <input type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-login" onclick="doLogin()">ログイン</button>
      <p class="login-error" id="loginError">パスワードが違います</p>
    </div>
  </div>
</div>

<!-- ===== MAIN ===== -->
<div id="mainScreen">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Next Season</h1>
      <p>申請管理システム</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-item active" onclick="showPage('list')">
        <span class="nav-icon">📋</span>申請一覧
      </div>
      <div class="nav-item" onclick="showPage('stats')">
        <span class="nav-icon">📊</span>統計・集計
      </div>
    </nav>
    <div class="sidebar-footer">© Next Season</div>
  </div>

  <div class="content">
    <div class="topbar">
      <h2 id="pageTitle">申請一覧</h2>
      <div class="topbar-right">
        <button class="btn-refresh" onclick="loadData()">🔄 更新</button>
        <button class="btn-logout" onclick="doLogout()">ログアウト</button>
      </div>
    </div>

    <div class="main-content">

      <!-- ===== LIST PAGE ===== -->
      <div id="page-list" class="page active">
        <div class="stats-grid" id="statsCards">
          <div class="stat-card"><div class="stat-label">総申請数</div><div class="stat-value" id="s-total">—</div></div>
          <div class="stat-card"><div class="stat-label">新規（未対応）</div><div class="stat-value" id="s-new" style="color:#1d4ed8">—</div></div>
          <div class="stat-card"><div class="stat-label">対応中</div><div class="stat-value" id="s-progress" style="color:#6d28d9">—</div></div>
          <div class="stat-card"><div class="stat-label">申請済み</div><div class="stat-value" id="s-submitted" style="color:#059669">—</div></div>
        </div>

        <div class="filter-bar">
          <input type="text" id="searchInput" placeholder="🔍　会社名・担当者名で検索..." oninput="renderTable()">
          <select id="statusFilter" onchange="renderTable()">
            <option value="">すべてのステータス</option>
            <option value="新規">新規</option>
            <option value="連絡済み">連絡済み</option>
            <option value="対応中">対応中</option>
            <option value="申請済み">申請済み</option>
            <option value="完了">完了</option>
          </select>
        </div>

        <div class="table-wrap">
          <div id="tableContent">
            <div class="loading"><div class="spinner"></div>データを読み込み中...</div>
          </div>
        </div>
      </div>

      <!-- ===== STATS PAGE ===== -->
      <div id="page-stats" class="page">
        <div class="table-wrap" style="padding:28px">
          <h3 style="font-size:15px;font-weight:700;color:var(--primary);margin-bottom:20px">月別申請数</h3>
          <div id="monthlyStats"><div class="loading"><div class="spinner"></div>集計中...</div></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">申請詳細</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxn8thednF67SoPIasKonFBtdfxVWI9mCDbK0Uh2Vt-BfjdWrLfuAtmikdC1uu2IgRR/exec';
const PASSWORD = 'next1234';

let allData = [];
let statusMap = {}; // row→status のローカル保持

// ===== LOGIN =====
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}

function doLogout() {
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

// ===== PAGE NAV =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.querySelectorAll('.nav-item').forEach((el, i) => {
    el.classList.toggle('active', (name === 'list' && i === 0) || (name === 'stats' && i === 1));
  });
  document.getElementById('pageTitle').textContent = name === 'list' ? '申請一覧' : '統計・集計';
  if (name === 'stats') renderMonthly();
}

// ===== LOAD DATA =====
async function loadData() {
  document.getElementById('tableContent').innerHTML = '<div class="loading"><div class="spinner"></div>データを読み込み中...</div>';
  try {
    const res = await fetch(GAS_URL + '?action=getAll');
    const json = await res.json();
    allData = json.data || [];
    renderTable();
    updateStats();
    showToast('データを更新しました', 'success');
  } catch(e) {
    document.getElementById('tableContent').innerHTML = '<div class="empty">⚠️ データの取得に失敗しました</div>';
    showToast('通信エラーが発生しました', 'error');
  }
}

// ===== STATS =====
function updateStats() {
  document.getElementById('s-total').innerHTML = allData.length + '<span>件</span>';
  document.getElementById('s-new').innerHTML = allData.filter(r => (r.status||'新規') === '新規').length + '<span>件</span>';
  document.getElementById('s-progress').innerHTML = allData.filter(r => ['連絡済み','対応中'].includes(r.status)).length + '<span>件</span>';
  document.getElementById('s-submitted').innerHTML = allData.filter(r => ['申請済み','完了'].includes(r.status)).length + '<span>件</span>';
}

// ===== RENDER TABLE =====
function renderTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const st = document.getElementById('statusFilter').value;

  const filtered = allData.filter(r => {
    const matchQ = !q || (r.companyName||'').toLowerCase().includes(q) || (r.contactName||'').toLowerCase().includes(q);
    const status = r.status || '新規';
    const matchS = !st || status === st;
    return matchQ && matchS;
  });

  if (!filtered.length) {
    document.getElementById('tableContent').innerHTML = '<div class="empty">該当するデータがありません</div>';
    return;
  }

  const rows = filtered.map(r => {
    const status = r.status || '新規';
    return `<tr>
      <td><div class="company-name">${esc(r.companyName||'—')}</div></td>
      <td>${esc(r.contactName||'—')}</td>
      <td>${esc(r.phone||'—')}</td>
      <td>${esc(r.email||'—')}</td>
      <td>${formatDate(r.timestamp)}</td>
      <td><span class="badge ${badgeClass(status)}">${status}</span></td>
      <td><button class="btn-detail" onclick="openModal(${r.rowIndex})">詳細</button></td>
    </tr>`;
  }).join('');

  document.getElementById('tableContent').innerHTML = `
    <table>
      <thead><tr>
        <th>会社名</th><th>担当者</th><th>電話番号</th><th>メール</th><th>申請日時</th><th>ステータス</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function badgeClass(s) {
  return {新規:'badge-new', 連絡済み:'badge-contact', 対応中:'badge-progress', 申請済み:'badge-submitted', 完了:'badge-done'}[s] || 'badge-new';
}

// ===== MODAL =====
function openModal(rowIdx) {
  const r = allData.find(d => d.rowIndex === rowIdx);
  if (!r) return;
  document.getElementById('modalTitle').textContent = r.companyName || '申請詳細';
  const status = r.status || '新規';

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-section">
      <h4>企業情報</h4>
      <div class="detail-grid">
        <div class="detail-item"><label>会社名</label><p>${esc(r.companyName||'—')}</p></div>
        <div class="detail-item"><label>担当者名</label><p>${esc(r.contactName||'—')}</p></div>
        <div class="detail-item"><label>電話番号</label><p>${esc(r.phone||'—')}</p></div>
        <div class="detail-item"><label>メールアドレス</label><p>${esc(r.email||'—')}</p></div>
        <div class="detail-item full"><label>所在地</label><p>${esc(r.address||'—')}</p></div>
        <div class="detail-item"><label>従業員数</label><p>${esc(r.employees||'—')}</p></div>
        <div class="detail-item"><label>申請日時</label><p>${formatDate(r.timestamp)}</p></div>
      </div>
    </div>

    <div class="detail-section">
      <h4>診断・申請内容</h4>
      <div class="detail-grid">
        <div class="detail-item full"><label>希望助成金</label><p>${esc(r.subsidy||'—')}</p></div>
        <div class="detail-item full"><label>備考・メモ</label><p style="white-space:pre-wrap">${esc(r.note||'—')}</p></div>
      </div>
    </div>

    <div class="detail-section">
      <h4>ステータス管理</h4>
      <div class="status-select-wrap">
        <label>ステータス</label>
        <select id="statusSel">
          <option ${status==='新規'?'selected':''}>新規</option>
          <option ${status==='連絡済み'?'selected':''}>連絡済み</option>
          <option ${status==='対応中'?'selected':''}>対応中</option>
          <option ${status==='申請済み'?'selected':''}>申請済み</option>
          <option ${status==='完了'?'selected':''}>完了</option>
        </select>
        <button class="btn-update" onclick="updateStatus(${rowIdx})">更新</button>
      </div>
      <div class="memo-wrap">
        <label>管理メモ</label>
        <textarea id="memoInput" placeholder="対応内容、連絡記録など...">${esc(r.memo||'')}</textarea>
      </div>
      <div style="text-align:right;margin-top:10px">
        <button class="btn-update" onclick="saveMemo(${rowIdx})">メモを保存</button>
      </div>
    </div>`;

  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// ===== UPDATE STATUS =====
async function updateStatus(rowIdx) {
  const newStatus = document.getElementById('statusSel').value;
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'updateStatus', rowIndex: rowIdx, status: newStatus })
    });
    const json = await res.json();
    if (json.success) {
      const r = allData.find(d => d.rowIndex === rowIdx);
      if (r) r.status = newStatus;
      renderTable();
      updateStats();
      showToast('ステータスを更新しました', 'success');
    } else {
      showToast('更新に失敗しました', 'error');
    }
  } catch(e) {
    showToast('通信エラーが発生しました', 'error');
  }
}

// ===== SAVE MEMO =====
async function saveMemo(rowIdx) {
  const memo = document.getElementById('memoInput').value;
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveMemo', rowIndex: rowIdx, memo })
    });
    const json = await res.json();
    if (json.success) {
      const r = allData.find(d => d.rowIndex === rowIdx);
      if (r) r.memo = memo;
      showToast('メモを保存しました', 'success');
    } else {
      showToast('保存に失敗しました', 'error');
    }
  } catch(e) {
    showToast('通信エラーが発生しました', 'error');
  }
}

// ===== MONTHLY STATS =====
function renderMonthly() {
  const monthly = {};
  allData.forEach(r => {
    if (!r.timestamp) return;
    const m = r.timestamp.substring(0, 7);
    monthly[m] = (monthly[m]||0) + 1;
  });
  const keys = Object.keys(monthly).sort().reverse();
  if (!keys.length) {
    document.getElementById('monthlyStats').innerHTML = '<div class="empty">データがありません</div>';
    return;
  }
  const max = Math.max(...Object.values(monthly));
  const rows = keys.map(k => {
    const v = monthly[k];
    const pct = Math.round(v / max * 100);
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:80px;font-size:13px;color:var(--text-sub)">${k}</div>
      <div style="flex:1;background:var(--bg);border-radius:4px;height:28px;overflow:hidden">
        <div style="width:${pct}%;background:var(--accent);height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px">
          <span style="color:white;font-size:12px;font-weight:700">${v}件</span>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('monthlyStats').innerHTML = rows;
}

// ===== HELPERS =====
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(ts) {
  if (!ts) return '—';
  return ts.replace('T',' ').substring(0,16);
}

function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(() => { t.className = 'toast'; }, 2800);
}
</script>
</body>
</html>
