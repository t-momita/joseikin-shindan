<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申請管理画面 | Next Season</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a2744;
    --accent: #2563eb;
    --accent-light: #3b82f6;
    --success: #059669;
    --warning: #d97706;
    --danger: #dc2626;
    --bg: #f0f4f8;
    --card: #ffffff;
    --text: #1e293b;
    --text-sub: #64748b;
    --border: #e2e8f0;
    --sidebar-w: 240px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* LOGIN */
  #loginScreen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #1a2744 0%, #2563eb 100%); }
  .login-box { background: white; border-radius: 16px; padding: 48px 40px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .login-logo { text-align: center; margin-bottom: 32px; }
  .login-logo h1 { font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 700; color: var(--primary); }
  .login-logo p { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
  .login-box label { display: block; font-size: 13px; font-weight: 500; color: var(--text-sub); margin-bottom: 6px; }
  .login-box input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; margin-bottom: 20px; }
  .login-box input:focus { border-color: var(--accent); }
  .btn-login { width: 100%; padding: 13px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s; }
  .btn-login:hover { background: #1d4ed8; }
  .login-error { color: var(--danger); font-size: 13px; text-align: center; margin-top: 12px; display: none; }

  /* LAYOUT */
  #mainScreen { display: none; }
  .sidebar { position: fixed; left: 0; top: 0; width: var(--sidebar-w); height: 100vh; background: var(--primary); color: white; display: flex; flex-direction: column; z-index: 100; }
  .sidebar-header { padding: 24px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .sidebar-header h1 { font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 700; }
  .sidebar-header p { font-size: 11px; opacity: 0.5; margin-top: 3px; }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-section { font-size: 10px; font-weight: 700; letter-spacing: 1px; opacity: 0.4; padding: 12px 12px 6px; text-transform: uppercase; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; cursor: pointer; transition: background 0.15s; margin-bottom: 4px; }
  .nav-item:hover { background: rgba(255,255,255,0.08); }
  .nav-item.active { background: var(--accent); }
  .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-footer { padding: 16px 20px; border-top: 1px solid rgba(255,255,255,0.1); font-size: 12px; opacity: 0.5; }
  .content { margin-left: var(--sidebar-w); min-height: 100vh; }
  .topbar { background: white; border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
  .topbar h2 { font-size: 18px; font-weight: 700; color: var(--primary); }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  .btn-refresh { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s; }
  .btn-refresh:hover { background: #1d4ed8; }
  .btn-logout { padding: 8px 16px; background: transparent; color: var(--text-sub); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .btn-logout:hover { background: #fee2e2; color: var(--danger); border-color: #fca5a5; }
  .main-content { padding: 32px; }

  /* STATS */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
  .stat-card { background: white; border-radius: 12px; padding: 20px 24px; border: 1px solid var(--border); }
  .stat-label { font-size: 12px; color: var(--text-sub); font-weight: 500; margin-bottom: 8px; }
  .stat-value { font-size: 28px; font-weight: 700; font-family: 'Inter', sans-serif; color: var(--primary); }
  .stat-value span { font-size: 13px; font-weight: 400; color: var(--text-sub); margin-left: 4px; }

  /* TABS */
  .tab-bar { display: flex; gap: 4px; background: white; border-radius: 12px; padding: 6px; border: 1px solid var(--border); margin-bottom: 20px; width: fit-content; }
  .tab-btn { padding: 8px 24px; border-radius: 8px; border: none; background: transparent; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; color: var(--text-sub); transition: all 0.2s; }
  .tab-btn.active { background: var(--accent); color: white; }

  /* FILTER */
  .filter-bar { background: white; border-radius: 12px; padding: 16px 20px; border: 1px solid var(--border); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .filter-bar input[type="text"] { flex: 1; min-width: 200px; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; transition: border-color 0.2s; }
  .filter-bar input:focus { border-color: var(--accent); }
  .filter-bar select { padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; background: white; cursor: pointer; }

  /* TABLE */
  .table-wrap { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead { background: #f8fafc; border-bottom: 1px solid var(--border); }
  th { padding: 12px 16px; text-align: left; font-weight: 600; color: var(--text-sub); font-size: 12px; white-space: nowrap; }
  td { padding: 14px 16px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .primary-text { font-weight: 600; color: var(--primary); }
  .sub-text { font-size: 12px; color: var(--text-sub); }
  .btn-detail { padding: 5px 14px; background: transparent; border: 1.5px solid var(--accent); color: var(--accent); border-radius: 6px; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; transition: all 0.2s; }
  .btn-detail:hover { background: var(--accent); color: white; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .badge-new { background: #dbeafe; color: #1d4ed8; }
  .badge-contact { background: #fef3c7; color: #92400e; }
  .badge-progress { background: #ede9fe; color: #6d28d9; }
  .badge-submitted { background: #d1fae5; color: #065f46; }
  .badge-done { background: #f1f5f9; color: #475569; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.active { display: flex; }
  .modal { background: white; border-radius: 16px; width: 100%; max-width: 720px; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 80px rgba(0,0,0,0.3); }
  .modal-header { padding: 24px 28px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: white; border-radius: 16px 16px 0 0; z-index: 10; }
  .modal-header h3 { font-size: 17px; font-weight: 700; color: var(--primary); }
  .modal-close { width: 32px; height: 32px; border-radius: 50%; border: none; background: var(--bg); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-sub); transition: background 0.2s; }
  .modal-close:hover { background: #fee2e2; color: var(--danger); }
  .modal-body { padding: 24px 28px; }
  .detail-section { margin-bottom: 24px; }
  .detail-section h4 { font-size: 12px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .detail-item label { display: block; font-size: 11px; color: var(--text-sub); margin-bottom: 3px; font-weight: 500; }
  .detail-item p { font-size: 14px; color: var(--text); font-weight: 500; }
  .detail-item.full { grid-column: 1/-1; }
  .doc-links { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .doc-link { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; background: #eff6ff; color: var(--accent); border: 1px solid #bfdbfe; border-radius: 6px; font-size: 12px; font-weight: 600; text-decoration: none; transition: all 0.2s; }
  .doc-link:hover { background: var(--accent); color: white; }
  .doc-link-none { font-size: 13px; color: var(--text-sub); }
  .status-select-wrap { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding: 16px; background: var(--bg); border-radius: 10px; }
  .status-select-wrap label { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
  .status-select-wrap select { flex: 1; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; outline: none; background: white; cursor: pointer; }
  .btn-update { padding: 9px 20px; background: var(--success); color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
  .btn-update:hover { background: #047857; }
  .memo-wrap { margin-top: 16px; }
  .memo-wrap label { display: block; font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
  .memo-wrap textarea { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: inherit; resize: vertical; min-height: 80px; outline: none; transition: border-color 0.2s; }
  .memo-wrap textarea:focus { border-color: var(--accent); }

  /* MISC */
  .loading { text-align: center; padding: 60px; color: var(--text-sub); }
  .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px; color: var(--text-sub); font-size: 14px; }
  .toast { position: fixed; bottom: 24px; right: 24px; padding: 14px 20px; background: var(--primary); color: white; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,0.2); z-index: 999; transform: translateY(80px); opacity: 0; transition: all 0.3s ease; }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }
  .page { display: none; }
  .page.active { display: block; }
  @media (max-width: 900px) {
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .detail-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Next Season</h1>
      <p>申請管理システム</p>
    </div>
    <div>
      <label>パスワード</label>
      <input type="password" id="pwInput" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-login" onclick="doLogin()">ログイン</button>
      <p class="login-error" id="loginError">パスワードが違います</p>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div class="sidebar">
    <div class="sidebar-header">
      <h1>Next Season</h1>
      <p>申請管理システム</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">メニュー</div>
      <div class="nav-item active" id="nav-list" onclick="showPage('list')">
        <span class="nav-icon">📋</span>申請管理
      </div>
      <div class="nav-item" id="nav-stats" onclick="showPage('stats')">
        <span class="nav-icon">📊</span>統計・集計
      </div>
    </nav>
    <div class="sidebar-footer">© Next Season</div>
  </div>

  <div class="content">
    <div class="topbar">
      <h2 id="pageTitle">申請管理</h2>
      <div class="topbar-right">
        <button class="btn-refresh" onclick="loadData()">🔄 更新</button>
        <button class="btn-logout" onclick="doLogout()">ログアウト</button>
      </div>
    </div>

    <div class="main-content">

      <!-- LIST PAGE -->
      <div id="page-list" class="page active">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-label">企業数</div><div class="stat-value" id="s-companies">—</div></div>
          <div class="stat-card"><div class="stat-label">従業員申請数</div><div class="stat-value" id="s-employees">—</div></div>
          <div class="stat-card"><div class="stat-label">新規（未対応）</div><div class="stat-value" id="s-new" style="color:#1d4ed8">—</div></div>
          <div class="stat-card"><div class="stat-label">申請済み</div><div class="stat-value" id="s-submitted" style="color:#059669">—</div></div>
        </div>

        <div class="tab-bar">
          <button class="tab-btn active" id="tab-company" onclick="switchTab('company')">🏢 企業マスタ</button>
          <button class="tab-btn" id="tab-employee" onclick="switchTab('employee')">👤 従業員申請</button>
        </div>

        <!-- 企業一覧 -->
        <div id="view-company">
          <div class="filter-bar">
            <input type="text" id="companySearch" placeholder="🔍　会社名・担当者名で検索..." oninput="renderCompanyTable()">
            <select id="companyStatusFilter" onchange="renderCompanyTable()">
              <option value="">すべてのステータス</option>
              <option value="新規">新規</option>
              <option value="連絡済み">連絡済み</option>
              <option value="対応中">対応中</option>
              <option value="申請済み">申請済み</option>
              <option value="完了">完了</option>
            </select>
          </div>
          <div class="table-wrap">
            <div id="companyTableContent"><div class="loading"><div class="spinner"></div>データを読み込み中...</div></div>
          </div>
        </div>

        <!-- 従業員申請一覧 -->
        <div id="view-employee" style="display:none">
          <div class="filter-bar">
            <input type="text" id="employeeSearch" placeholder="🔍　会社名・従業員名で検索..." oninput="renderEmployeeTable()">
            <select id="employeeStatusFilter" onchange="renderEmployeeTable()">
              <option value="">すべてのステータス</option>
              <option value="新規">新規</option>
              <option value="連絡済み">連絡済み</option>
              <option value="対応中">対応中</option>
              <option value="申請済み">申請済み</option>
              <option value="完了">完了</option>
            </select>
          </div>
          <div class="table-wrap">
            <div id="employeeTableContent"><div class="loading"><div class="spinner"></div>データを読み込み中...</div></div>
          </div>
        </div>
      </div>

      <!-- STATS PAGE -->
      <div id="page-stats" class="page">
        <div class="stats-grid" style="grid-template-columns: repeat(2,1fr); margin-bottom:24px">
          <div class="table-wrap" style="padding:24px">
            <h3 style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:16px">🏢 企業ステータス別</h3>
            <div id="statsCompanyStatus"></div>
          </div>
          <div class="table-wrap" style="padding:24px">
            <h3 style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:16px">👤 従業員申請ステータス別</h3>
            <div id="statsEmployeeStatus"></div>
          </div>
        </div>
        <div class="table-wrap" style="padding:24px">
          <h3 style="font-size:14px;font-weight:700;color:var(--primary);margin-bottom:16px">📅 月別登録数（企業）</h3>
          <div id="statsMonthly"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">詳細</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbxn8thednF67SoPIasKonFBtdfxVWI9mCDbK0Uh2Vt-BfjdWrLfuAtmikdC1uu2IgRR/exec';
const PASSWORD = 'next1234';

let companies = [];
let employees = [];
let currentTab = 'company';

// LOGIN
function doLogin() {
  const pw = document.getElementById('pwInput').value;
  if (pw === PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    loadData();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function doLogout() {
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('pwInput').value = '';
}

// PAGE NAV
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-list').classList.toggle('active', name === 'list');
  document.getElementById('nav-stats').classList.toggle('active', name === 'stats');
  document.getElementById('pageTitle').textContent = name === 'list' ? '申請管理' : '統計・集計';
  if (name === 'stats') renderStats();
}

// TAB
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-company').classList.toggle('active', tab === 'company');
  document.getElementById('tab-employee').classList.toggle('active', tab === 'employee');
  document.getElementById('view-company').style.display = tab === 'company' ? 'block' : 'none';
  document.getElementById('view-employee').style.display = tab === 'employee' ? 'block' : 'none';
}

// LOAD DATA
async function loadData() {
  const html = '<div class="loading"><div class="spinner"></div>データを読み込み中...</div>';
  document.getElementById('companyTableContent').innerHTML = html;
  document.getElementById('employeeTableContent').innerHTML = html;
  try {
    const res = await fetch(GAS_URL + '?action=getAdminData');
    const json = await res.json();
    if (!json.success) throw new Error('GAS error');
    companies = json.companies || [];
    employees = json.employees || [];
    updateStats();
    renderCompanyTable();
    renderEmployeeTable();
    showToast('データを更新しました', 'success');
  } catch(e) {
    document.getElementById('companyTableContent').innerHTML = '<div class="empty">⚠️ データの取得に失敗しました</div>';
    document.getElementById('employeeTableContent').innerHTML = '<div class="empty">⚠️ データの取得に失敗しました</div>';
    showToast('通信エラーが発生しました', 'error');
  }
}

// STATS CARDS
function updateStats() {
  document.getElementById('s-companies').innerHTML = companies.length + '<span>社</span>';
  document.getElementById('s-employees').innerHTML = employees.length + '<span>件</span>';
  const newCount = companies.filter(c => (c.status||'新規') === '新規').length
                 + employees.filter(e => (e.status||'新規') === '新規').length;
  const submittedCount = companies.filter(c => ['申請済み','完了'].includes(c.status)).length
                       + employees.filter(e => ['申請済み','完了'].includes(e.status)).length;
  document.getElementById('s-new').innerHTML = newCount + '<span>件</span>';
  document.getElementById('s-submitted').innerHTML = submittedCount + '<span>件</span>';
}

// COMPANY TABLE
function renderCompanyTable() {
  const q = document.getElementById('companySearch').value.toLowerCase();
  const st = document.getElementById('companyStatusFilter').value;
  const filtered = companies.filter(r => {
    const matchQ = !q || (r.name||'').toLowerCase().includes(q) || (r.contactName||'').toLowerCase().includes(q) || (r.tantouName||'').toLowerCase().includes(q);
    return matchQ && (!st || (r.status||'新規') === st);
  });
  if (!filtered.length) {
    document.getElementById('companyTableContent').innerHTML = '<div class="empty">該当するデータがありません</div>';
    return;
  }
  const rows = filtered.map(r => `<tr>
    <td><div class="primary-text">${esc(r.id||'—')}</div></td>
    <td><div class="primary-text">${esc(r.name||'—')}</div></td>
    <td>${esc(r.contactName||r.tantouName||'—')}</td>
    <td>${esc(r.phone||r.contactPhone||'—')}</td>
    <td>${esc(r.email||'—')}</td>
    <td>${formatDate(r.registeredAt)}</td>
    <td><span class="badge ${badgeClass(r.status||'新規')}">${r.status||'新規'}</span></td>
    <td><button class="btn-detail" onclick="openCompanyModal('${esc(r.id)}')">詳細</button></td>
  </tr>`).join('');
  document.getElementById('companyTableContent').innerHTML = `
    <table><thead><tr>
      <th>企業ID</th><th>会社名</th><th>担当者</th><th>電話番号</th><th>メール</th><th>登録日時</th><th>ステータス</th><th></th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

// EMPLOYEE TABLE
function renderEmployeeTable() {
  const q = document.getElementById('employeeSearch').value.toLowerCase();
  const st = document.getElementById('employeeStatusFilter').value;
  const filtered = employees.filter(r => {
    const matchQ = !q || (r.companyName||'').toLowerCase().includes(q) || (r.employeeName||'').toLowerCase().includes(q);
    return matchQ && (!st || (r.status||'新規') === st);
  });
  if (!filtered.length) {
    document.getElementById('employeeTableContent').innerHTML = '<div class="empty">該当するデータがありません</div>';
    return;
  }
  const rows = filtered.map(r => `<tr>
    <td><div class="primary-text">${esc(r.applyId||'—')}</div></td>
    <td>${esc(r.companyName||'—')}</td>
    <td><div class="primary-text">${esc(r.employeeName||'—')}</div></td>
    <td><div class="sub-text">${esc(r.beforeType||'—')}</div></td>
    <td>${formatDate(r.tenkanDate)}</td>
    <td>${formatDate(r.appliedAt)}</td>
    <td><span class="badge ${badgeClass(r.status||'新規')}">${r.status||'新規'}</span></td>
    <td><button class="btn-detail" onclick="openEmployeeModal('${esc(r.applyId)}')">詳細</button></td>
  </tr>`).join('');
  document.getElementById('employeeTableContent').innerHTML = `
    <table><thead><tr>
      <th>申請ID</th><th>会社名</th><th>従業員名</th><th>転換前雇用区分</th><th>転換予定日</th><th>申請日時</th><th>ステータス</th><th></th>
    </tr></thead><tbody>${rows}</tbody></table>`;
}

// COMPANY MODAL

  document.getElementById('modalTitle').textContent = r.name || '企業詳細';

  const docItems = [
    { label: '履歴事項全部証明書', url: r.tokiUrl },
    { label: '雇用保険適用事業所設置届', url: r.koyoUrl },
    { label: '就業規則', url: r.shugyoUrl },
    { label: '賃金規定', url: r.chinginKiteiUrl },
    { label: 'キャリアアップ計画書', url: r.keikakuUrl },
  ];
  const docsHtml = docItems.some(d => d.url && d.url.startsWith('http'))
    ? `<div class="doc-links">${docItems.map(d => d.url && d.url.startsWith('http') ? `<a href="${esc(d.url)}" target="_blank" class="doc-link">📄 ${d.label}</a>` : '').join('')}</div>`
    : '<p class="doc-link-none">書類未アップロード</p>';

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-section">
      <h4>企業基本情報</h4>
      <div class="detail-grid">
        <div class="detail-item"><label>企業ID</label><p>${esc(r.id||'—')}</p></div>
        <div class="detail-item"><label>会社名</label><p>${esc(r.name||'—')}</p></div>
        <div class="detail-item"><label>電話番号</label><p>${esc(r.phone||r.contactPhone||'—')}</p></div>
        <div class="detail-item"><label>メールアドレス</label><p>${esc(r.email||'—')}</p></div>
        <div class="detail-item"><label>担当者名</label><p>${esc(r.contactName||'—')}</p></div>
        <div class="detail-item"><label>担当部署</label><p>${esc(r.contactBusho||'—')}</p></div>
        <div class="detail-item"><label>登録日時</label><p>${formatDate(r.registeredAt)}</p></div>
        <div class="detail-item"><label>ステータス</label><p>${esc(status)}</p></div>
      </div>
    </div>
    <div class="detail-section">
      <h4>役員・代表者情報</h4>
      <div class="detail-grid">
        <div class="detail-item"><label>担当役職</label><p>${esc(r.tantouYakushoku||'—')}</p></div>
        <div class="detail-item"><label>担当者名（役員）</label><p>${esc(r.tantouName||'—')}</p></div>
        <div class="detail-item full"><label>労働者代表</label><p>${esc(r.rodoushaDaihyo||'—')}</p></div>
      </div>
    </div>
    <div class="detail-section">
      <h4>賃金・計画情報</h4>
      <div class="detail-grid">
        <div class="detail-item"><label>賃金規定有無</label><p>${esc(r.chinginAri||'—')}</p></div>
        <div class="detail-item"><label>キャリアアップ計画書有無</label><p>${esc(r.keikakuAri||'—')}</p></div>
      </div>
    </div>
    <div class="detail-section">
      <h4>アップロード書類</h4>
      ${docsHtml}
    </div>
    <div class="detail-section">
      <h4>ステータス管理</h4>
      <div class="status-select-wrap">
        <label>ステータス</label>
        <select id="statusSel">${statusOptions(status)}</select>
        <button class="btn-update" onclick="updateCompanyStatus('${esc(r.id)}')">更新</button>
      </div>
      <div class="memo-wrap">
        <label>管理メモ</label>
        <textarea id="memoInput" placeholder="対応内容、連絡記録など...">${esc(r.memo||'')}</textarea>
      </div>
      <div style="text-align:right;margin-top:10px">
        <button class="btn-update" onclick="saveCompanyMemo('${esc(r.id)}')">メモを保存</button>
      </div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('active');
}

// EMPLOYEE MODAL

  if (!r) return;
  const status = r.status || '新規';
  document.getElementById('modalTitle').textContent = r.employeeName + '（' + (r.companyName||'') + '）';

  const docItems = [
    { label: '資格喪失届', url: r.soshitssuUrl },
    { label: '雇用契約書', url: r.keiyakuUrl },
    { label: '賃金台帳', url: r.chinginUrl },
    { label: '出勤簿', url: r.shukkinUrl },
  ];
  const docsHtml = docItems.some(d => d.url && d.url.startsWith('http'))
    ? `<div class="doc-links">${docItems.map(d => d.url && d.url.startsWith('http') ? `<a href="${esc(d.url)}" target="_blank" class="doc-link">📄 ${d.label}</a>` : '').join('')}</div>`
    : '<p class="doc-link-none">書類未アップロード</p>';

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-section">
      <h4>申請情報</h4>
      <div class="detail-grid">
        <div class="detail-item"><label>申請ID</label><p>${esc(r.applyId||'—')}</p></div>
        <div class="detail-item"><label>企業ID</label><p>${esc(r.companyId||'—')}</p></div>
        <div class="detail-item"><label>会社名</label><p>${esc(r.companyName||'—')}</p></div>
        <div class="detail-item"><label>従業員名</label><p>${esc(r.employeeName||'—')}</p></div>
        <div class="detail-item"><label>転換前雇用区分</label><p>${esc(r.beforeType||'—')}</p></div>
        <div class="detail-item"><label>雇用開始日</label><p>${formatDate(r.koyoStartDate)}</p></div>
        <div class="detail-item"><label>転換予定日</label><p>${formatDate(r.tenkanDate)}</p></div>
        <div class="detail-item"><label>転換後賃金</label><p>${esc(r.kyuyo||'—')}</p></div>
        <div class="detail-item"><label>申請日時</label><p>${formatDate(r.appliedAt)}</p></div>
        <div class="detail-item"><label>ステータス</label><p>${esc(status)}</p></div>

    </div>
    <div class="detail-section">

      ${docsHtml}

      <h4>ステータス管理</h4>
      <div class="status-select-wrap">
        <label>ステータス</label>
        <select id="statusSel">${statusOptions(status)}</select>
        <button class="btn-update" onclick="updateEmployeeStatus('${esc(r.applyId)}')">更新</button>
      </div>
      <div class="memo-wrap">
        <label>管理メモ</label>
        <textarea id="memoInput" placeholder="対応内容、連絡記録など...">${esc(r.memo||'')}</textarea>
      </div>
      <div style="text-align:right;margin-top:10px">
        <button class="btn-update" onclick="saveEmployeeMemo('${esc(r.applyId)}')">メモを保存</button>
      </div>
    </div>`;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

// UPDATE STATUS
async function updateCompanyStatus(id) {
  const newStatus = document.getElementById('statusSel').value;
  await postGAS({ action: 'updateCompanyStatus', id, status: newStatus }, () => {
    const r = companies.find(c => c.id === id);
    if (r) r.status = newStatus;
    renderCompanyTable();
    updateStats();
  });
}

async function updateEmployeeStatus(applyId) {
  const newStatus = document.getElementById('statusSel').value;
  await postGAS({ action: 'updateEmployeeStatus', applyId, status: newStatus }, () => {
    const r = employees.find(e => e.applyId === applyId);
    if (r) r.status = newStatus;
    renderEmployeeTable();
    updateStats();
  });
}

// SAVE MEMO
async function saveCompanyMemo(id) {
  const memo = document.getElementById('memoInput').value;
  await postGAS({ action: 'saveCompanyMemo', id, memo }, () => {
    const r = companies.find(c => c.id === id);
    if (r) r.memo = memo;
  });
}

async function saveEmployeeMemo(applyId) {
  const memo = document.getElementById('memoInput').value;
  await postGAS({ action: 'saveEmployeeMemo', applyId, memo }, () => {
    const r = employees.find(e => e.applyId === applyId);
    if (r) r.memo = memo;
  });
}

async function postGAS(body, onSuccess) {
  try {
    const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(body) });
    const json = await res.json();
    if (json.success) { showToast('更新しました', 'success'); if (onSuccess) onSuccess(); }
    else showToast('更新に失敗しました', 'error');
  } catch(e) {
    showToast('通信エラーが発生しました', 'error');
  }
}

// STATS PAGE
function renderStats() {
  renderStatusBar('statsCompanyStatus', companies);
  renderStatusBar('statsEmployeeStatus', employees);
  renderMonthly();
}

function renderStatusBar(elId, data) {
  const counts = {};
  data.forEach(r => { const s = r.status || '新規'; counts[s] = (counts[s]||0) + 1; });
  const total = data.length || 1;
  const rows = ['新規','連絡済み','対応中','申請済み','完了'].map(s => {
    const v = counts[s] || 0;
    const pct = Math.round(v / total * 100);
    return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
      <span class="badge ${badgeClass(s)}" style="width:70px;justify-content:center">${s}</span>
      <div style="flex:1;background:var(--bg);border-radius:4px;height:24px;overflow:hidden">
        ${v > 0 ? `<div style="width:${pct}%;background:var(--accent);height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;min-width:30px"><span style="color:white;font-size:11px;font-weight:700">${v}件</span></div>` : ''}
      </div>
      <span style="font-size:12px;color:var(--text-sub);width:30px;text-align:right">${v}</span>
    </div>`;
  }).join('');
  document.getElementById(elId).innerHTML = rows;
}

function renderMonthly() {
  const monthly = {};
  companies.forEach(r => {
    if (!r.registeredAt) return;
    const m = String(r.registeredAt).substring(0,7);
    monthly[m] = (monthly[m]||0) + 1;
  });
  const keys = Object.keys(monthly).sort().reverse();
  if (!keys.length) { document.getElementById('statsMonthly').innerHTML = '<div class="empty">データがありません</div>'; return; }
  const max = Math.max(...Object.values(monthly));
  document.getElementById('statsMonthly').innerHTML = keys.map(k => {
    const v = monthly[k];
    const pct = Math.round(v / max * 100);
    return `<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <div style="width:80px;font-size:13px;color:var(--text-sub)">${k}</div>
      <div style="flex:1;background:var(--bg);border-radius:4px;height:28px;overflow:hidden">
        <div style="width:${pct}%;background:var(--accent);height:100%;border-radius:4px;display:flex;align-items:center;padding-left:10px;min-width:40px">
          <span style="color:white;font-size:12px;font-weight:700">${v}社</span></div>
      </div>
    </div>`;
  }).join('');
}

// HELPERS
function statusOptions(current) {
  return ['新規','連絡済み','対応中','申請済み','完了'].map(s => `<option ${s===current?'selected':''}>${s}</option>`).join('');
}
function badgeClass(s) {
  return {新規:'badge-new', 連絡済み:'badge-contact', 対応中:'badge-progress', 申請済み:'badge-submitted', 完了:'badge-done'}[s] || 'badge-new';
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(ts) {
  if (!ts) return '—';
  return String(ts).replace('T',' ').substring(0,16);
}
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type?' '+type:'');
  setTimeout(() => { t.className = 'toast'; }, 2800);
}
</script>
